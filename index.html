<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CJLB Engineering Toolbox — Process Engineering Suite</title>
<meta name="description" content="Advanced R&D Process Engineering Tools. Professional toolkit for manufacturing excellence."/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%234f8cff'/><circle cx='16' cy='16' r='8' fill='white'/></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg-deep:#0a0e1a;
  --bg-surface:rgba(15,23,42,.45);
  --bg-card:rgba(255,255,255,.08);
  --bg-card-hover:rgba(255,255,255,.12);
  --text:#f1f5f9;
  --text-dim:#94a3b8;
  --text-muted:#64748b;
  --border:rgba(255,255,255,.1);
  --border-bright:rgba(114,168,255,.3);
  --blue:#4f8cff;
  --blue-light:#72a8ff;
  --blue-glow:79,140,255;
  --purple:#8b5cf6;
  --purple-glow:139,92,246;
  --green:#43b36b;
  --green-glow:67,179,107;
  --cyan:#06b6d4;
  --cyan-glow:6,182,212;
  --amber:#f59e0b;
  --red:#ef5b67;
  --logo-src:url('logo2.png');
}
:root[data-theme="light"]{
  --bg-deep:#f8fafc;
  --bg-surface:rgba(255,255,255,.7);
  --bg-card:rgba(255,255,255,.75);
  --bg-card-hover:rgba(255,255,255,.9);
  --text:#0f172a;
  --text-dim:#475569;
  --text-muted:#64748b;
  --border:rgba(15,23,42,.15);
  --border-bright:rgba(79,140,255,.4);
  --logo-src:url('logo1.png');
}
html{scroll-behavior:smooth}
body{
  min-height:100vh;
  font-family:'Inter',sans-serif;
  background:var(--bg-deep);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  overflow-x:hidden;
  transition:background .5s,color .5s;
}

/* === BACKGROUND === */
.scene{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;
}
.bg-gradient{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 15% 20%,rgba(var(--purple-glow),.25),transparent 35%),
    radial-gradient(circle at 85% 15%,rgba(var(--blue-glow),.2),transparent 30%),
    radial-gradient(circle at 50% 85%,rgba(var(--purple-glow),.18),transparent 40%),
    linear-gradient(160deg,#1a1429 0%,#0f0a1e 50%,#08050f 100%);
}
:root[data-theme="light"] .bg-gradient{
  background:
    radial-gradient(circle at 15% 20%,rgba(200,180,230,.15),transparent 35%),
    radial-gradient(circle at 85% 15%,rgba(var(--blue-glow),.1),transparent 30%),
    linear-gradient(160deg,#f5f3f8 0%,#ebe8f0 50%,#e0dce8 100%);
}

/* 3D Spheres */
.spheres{
  position:absolute;
  inset:0;
  opacity:.6;
}
:root[data-theme="light"] .spheres{opacity:.3}
.sphere{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.4),rgba(var(--purple-glow),.3) 50%,rgba(var(--purple-glow),.1));
  box-shadow:
    inset -20px -20px 40px rgba(0,0,0,.2),
    inset 10px 10px 30px rgba(255,255,255,.2),
    0 30px 80px rgba(var(--purple-glow),.4);
  animation:sphereFloat ease-in-out infinite;
}
.sphere-1{
  width:280px;
  height:280px;
  top:10%;
  right:8%;
  animation-duration:20s;
  animation-delay:0s;
}
.sphere-2{
  width:180px;
  height:180px;
  top:55%;
  right:15%;
  animation-duration:25s;
  animation-delay:-8s;
  opacity:.7;
}
.sphere-3{
  width:120px;
  height:120px;
  top:25%;
  right:25%;
  animation-duration:18s;
  animation-delay:-12s;
  opacity:.5;
}
.sphere-4{
  width:90px;
  height:90px;
  bottom:20%;
  left:12%;
  animation-duration:22s;
  animation-delay:-5s;
  opacity:.6;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.3),rgba(var(--blue-glow),.3) 50%,rgba(var(--cyan-glow),.1));
  box-shadow:
    inset -15px -15px 30px rgba(0,0,0,.2),
    inset 8px 8px 20px rgba(255,255,255,.15),
    0 20px 60px rgba(var(--blue-glow),.4);
}
@keyframes sphereFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(20px,-30px) scale(1.05)}
  50%{transform:translate(-15px,25px) scale(.98)}
  75%{transform:translate(25px,15px) scale(1.02)}
}

/* Organic Blobs */
.blobs{
  position:absolute;
  inset:0;
  opacity:.15;
  filter:blur(120px);
}
.blob{
  position:absolute;
  border-radius:40% 60% 70% 30% / 40% 50% 60% 50%;
  animation:blobMorph ease-in-out infinite;
}
.blob-1{
  width:600px;
  height:600px;
  top:-10%;
  left:-5%;
  background:linear-gradient(135deg,rgba(var(--purple-glow),.4),rgba(var(--blue-glow),.3));
  animation-duration:30s;
}
.blob-2{
  width:500px;
  height:500px;
  bottom:-8%;
  right:-3%;
  background:linear-gradient(135deg,rgba(var(--blue-glow),.35),rgba(var(--cyan-glow),.25));
  animation-duration:35s;
  animation-delay:-15s;
}
@keyframes blobMorph{
  0%,100%{
    transform:translate(0,0) rotate(0deg);
    border-radius:40% 60% 70% 30% / 40% 50% 60% 50%;
  }
  33%{
    transform:translate(30px,-40px) rotate(120deg);
    border-radius:60% 40% 30% 70% / 60% 30% 70% 40%;
  }
  66%{
    transform:translate(-25px,35px) rotate(240deg);
    border-radius:30% 60% 70% 40% / 50% 60% 30% 60%;
  }
}

/* Particles */
.particles{
  position:absolute;
  inset:0;
  opacity:.4;
}
.particle{
  position:absolute;
  width:3px;
  height:3px;
  background:radial-gradient(circle,rgba(255,200,120,.8),transparent);
  border-radius:50%;
  filter:blur(.8px);
  animation:particleRise linear infinite;
}
@keyframes particleRise{
  0%{transform:translateY(100vh) translateX(0) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:.8}
  100%{transform:translateY(-10vh) translateX(var(--drift,20px)) scale(1.2);opacity:0}
}
.particle:nth-child(1){left:15%;--drift:25px;animation-duration:28s;animation-delay:0s}
.particle:nth-child(2){left:35%;--drift:-30px;animation-duration:32s;animation-delay:5s}
.particle:nth-child(3){left:55%;--drift:35px;animation-duration:30s;animation-delay:10s}
.particle:nth-child(4){left:75%;--drift:-25px;animation-duration:34s;animation-delay:3s}
.particle:nth-child(5){left:25%;--drift:40px;animation-duration:29s;animation-delay:8s}
.particle:nth-child(6){left:65%;--drift:-35px;animation-duration:31s;animation-delay:12s}

/* Noise */
.noise{
  position:absolute;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='5'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.05;
  mix-blend-mode:overlay;
  pointer-events:none;
}

/* === CONTAINER === */
.container{
  position:relative;
  z-index:10;
  max-width:1400px;
  margin:0 auto;
  padding:0 24px;
}

/* === HEADER === */
.header{
  position:sticky;
  top:0;
  z-index:100;
  padding:20px 0;
  margin-bottom:60px;
  background:linear-gradient(180deg,var(--bg-deep) 70%,transparent);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  animation:slideDown .6s ease;
}
@keyframes slideDown{
  0%{opacity:0;transform:translateY(-20px)}
  100%{opacity:1;transform:translateY(0)}
}
.header-inner{
  max-width:1400px;
  margin:0 auto;
  padding:0 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand{
  display:flex;
  align-items:center;
  gap:16px;
}
.brand-logo{
  width:56px;
  height:56px;
  border-radius:16px;
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border-bright);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(var(--blue-glow),.25);
  transition:transform .3s;
  padding:6px;
}
.brand-logo:hover{transform:scale(1.05) rotate(2deg)}
.logo-img{
  width:100%;
  height:100%;
  object-fit:contain;
  object-position:center;
  content:var(--logo-src);
}
.brand-text{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.brand-name{
  font-size:20px;
  font-weight:900;
  letter-spacing:-.02em;
  background:linear-gradient(135deg,var(--blue-light),var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand-tagline{
  font-size:11px;
  color:var(--text-dim);
  text-transform:uppercase;
  letter-spacing:.1em;
  font-weight:600;
}
.header-actions{
  display:flex;
  gap:12px;
  align-items:center;
  position:relative;
}
.hamburger-btn{
  width:48px;
  height:48px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  cursor:pointer;
  display:grid;
  place-items:center;
  transition:all .3s;
  position:relative;
  z-index:101;
}
.hamburger-btn:hover{
  border-color:var(--border-bright);
  background:var(--bg-card-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(var(--blue-glow),.2);
}
.hamburger-icon{
  display:flex;
  flex-direction:column;
  gap:4px;
  width:18px;
}
.hamburger-line{
  width:100%;
  height:2px;
  background:var(--text);
  border-radius:2px;
  transition:all .3s;
}
.hamburger-btn.active .hamburger-line:nth-child(1){
  transform:translateY(6px) rotate(45deg);
}
.hamburger-btn.active .hamburger-line:nth-child(2){
  opacity:0;
}
.hamburger-btn.active .hamburger-line:nth-child(3){
  transform:translateY(-6px) rotate(-45deg);
}

/* Settings Menu */
.settings-menu{
  position:absolute;
  top:calc(100% + 12px);
  right:0;
  min-width:220px;
  background:var(--bg-card);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--border-bright);
  border-radius:16px;
  padding:12px;
  opacity:0;
  visibility:hidden;
  transform:translateY(-10px);
  transition:all .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 20px 60px rgba(0,0,0,.4);
  z-index:100;
}
.settings-menu.active{
  opacity:1;
  visibility:visible;
  transform:translateY(0);
}
.settings-group{
  margin-bottom:8px;
}
.settings-group:last-child{
  margin-bottom:0;
}
.settings-label{
  font-size:11px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:.08em;
  font-weight:700;
  padding:8px 12px 4px;
}
.settings-option{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
  font-size:14px;
  font-weight:600;
  color:var(--text);
}
.settings-option:hover{
  background:rgba(var(--blue-glow),.1);
}
.settings-option.active{
  background:rgba(var(--blue-glow),.15);
  color:var(--blue-light);
}
.option-icon{
  font-size:16px;
}

/* Admin Section */
.admin-section{
  border-top:1px solid var(--border);
  padding-top:12px;
  margin-top:8px;
}
.admin-unlock{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:12px;
}
.admin-input{
  width:100%;
  height:36px;
  padding:0 12px;
  border-radius:8px;
  border:1px solid var(--border);
  background:rgba(var(--blue-glow),.05);
  color:var(--text);
  font:inherit;
  font-size:13px;
  transition:all .2s;
}
.admin-input:focus{
  outline:none;
  border-color:var(--border-bright);
  background:rgba(var(--blue-glow),.1);
}
.admin-btn{
  width:100%;
  height:36px;
  border-radius:8px;
  border:1px solid var(--border-bright);
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;
  font:inherit;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all .3s;
}
.admin-btn:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 12px rgba(var(--blue-glow),.4);
}
.admin-btn:active{
  transform:translateY(0);
}

/* Admin Modal */
.admin-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:200;
  opacity:0;
  visibility:hidden;
  transition:all .3s;
  padding:20px;
}
.admin-modal.active{
  opacity:1;
  visibility:visible;
}
.modal-content{
  width:100%;
  max-width:500px;
  background:var(--bg-surface);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--border-bright);
  border-radius:20px;
  padding:32px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
  transform:scale(.9);
  transition:transform .3s;
}
.admin-modal.active .modal-content{
  transform:scale(1);
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}
.modal-title{
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,var(--blue-light),var(--cyan));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.modal-close{
  width:32px;
  height:32px;
  border-radius:8px;
  border:1px solid var(--border);
  background:var(--bg-card);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  display:grid;
  place-items:center;
  transition:all .2s;
}
.modal-close:hover{
  border-color:var(--border-bright);
  background:var(--bg-card-hover);
}
.link-editor{
  display:flex;
  flex-direction:column;
  gap:20px;
}
.link-item{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.link-label{
  font-size:13px;
  font-weight:700;
  color:var(--text-dim);
  display:flex;
  align-items:center;
  gap:8px;
}
.link-label-icon{
  font-size:16px;
}
.link-input{
  width:100%;
  height:44px;
  padding:0 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg-card);
  color:var(--text);
  font:inherit;
  font-size:14px;
  transition:all .2s;
}
.link-input:focus{
  outline:none;
  border-color:var(--border-bright);
  background:var(--bg-card-hover);
  box-shadow:0 0 0 3px rgba(var(--blue-glow),.1);
}
.modal-actions{
  display:flex;
  gap:12px;
  margin-top:24px;
}
.modal-btn{
  flex:1;
  height:48px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg-card);
  color:var(--text);
  font:inherit;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:all .3s;
}
.modal-btn:hover{
  border-color:var(--border-bright);
  transform:translateY(-2px);
}
.modal-btn-primary{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border-color:transparent;
  color:#fff;
  box-shadow:0 4px 16px rgba(var(--blue-glow),.3);
}
.modal-btn-primary:hover{
  box-shadow:0 8px 24px rgba(var(--blue-glow),.4);
}
.btn{
  height:48px;
  padding:0 20px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  color:var(--text);
  font:inherit;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  transition:all .3s;
  white-space:nowrap;
}
.btn:hover{
  border-color:var(--border-bright);
  background:var(--bg-card-hover);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(var(--blue-glow),.2);
}

/* === HERO === */
.hero{
  text-align:center;
  margin-bottom:80px;
  animation:fadeUp .8s ease .2s backwards;
}
@keyframes fadeUp{
  0%{opacity:0;transform:translateY(30px)}
  100%{opacity:1;transform:translateY(0)}
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 16px;
  border-radius:20px;
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border-bright);
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:.1em;
  color:var(--blue-light);
  margin-bottom:24px;
  box-shadow:0 4px 16px rgba(var(--blue-glow),.15);
}
.badge-dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--blue);
  box-shadow:0 0 12px rgba(var(--blue-glow),.8);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.4}
}
.hero-title{
  font-size:clamp(40px,6vw,72px);
  font-weight:900;
  letter-spacing:-.04em;
  line-height:1.1;
  margin-bottom:20px;
  background:linear-gradient(135deg,var(--text) 20%,var(--blue-light) 60%,var(--purple) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-subtitle{
  font-size:clamp(16px,2.5vw,20px);
  color:var(--text-dim);
  max-width:700px;
  margin:0 auto 32px;
  line-height:1.6;
}
.hero-cta{
  display:inline-flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}
.btn-primary{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border-color:transparent;
  color:#fff;
  font-weight:700;
  box-shadow:0 8px 24px rgba(var(--blue-glow),.3);
}
.btn-primary:hover{
  box-shadow:0 12px 32px rgba(var(--blue-glow),.4);
  transform:translateY(-3px);
}

/* === TOOLS GRID === */
.tools-section{
  margin-bottom:100px;
}
.section-header{
  margin-bottom:40px;
}
.section-title{
  font-size:clamp(24px,4vw,32px);
  font-weight:800;
  margin-bottom:8px;
  letter-spacing:-.02em;
}
.section-subtitle{
  color:var(--text-dim);
  font-size:16px;
}
.tools-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
  animation:fadeUp .8s ease .4s backwards;
}

/* === TOOL CARD === */
.tool-card{
  position:relative;
  border-radius:24px;
  background:var(--bg-card);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  border:1px solid var(--border);
  padding:32px;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
  min-height:280px;
  display:flex;
  flex-direction:column;
  text-decoration:none;
  color:inherit;
}
.tool-card::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(var(--blue-glow),.1),rgba(var(--purple-glow),.05));
  opacity:0;
  transition:opacity .4s;
}
.tool-card::after{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:24px;
  padding:2px;
  background:linear-gradient(135deg,rgba(var(--blue-glow),.4),rgba(var(--purple-glow),.4));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  opacity:0;

    ?`<span class="status-dot"></span><span>${lang==='es'?'Activo':'Active'}</span>`
    :`<span>${esc(lang==='es'?(c.holdLabelEs||'Próximamente'):(c.holdLabelEn||'Coming Soon'))}</span>`;
  return `<${tag}${href} class="tool-card${inactive}">${badge}<div class="card-header"><div class="card-icon-wrapper">${c.icon}</div><h3 class="card-title">${name}</h3><p class="card-description">${desc}</p></div><div class="card-footer"><div class="card-status">${statusHTML}</div><div class="card-arrow">→</div></div></${tag}>`;
}

// === DATE ===
function updateDate(){
  const n=new Date(),d=n.getDate(),m=n.getMonth(),y=n.getFullYear(),w=n.getDay();
  document.getElementById('currentDate').textContent=lang==='es'
    ?`${days.es[w]}, ${d} de ${months.es[m]} ${y}`
    :`${days.en[w]}, ${months.en[m]} ${d}, ${y}`;
}

// === SETTINGS ===
function toggleSettings(){
  document.getElementById('hamburgerBtn').classList.toggle('active');
  document.getElementById('settingsMenu').classList.toggle('active');
}
document.addEventListener('click',e=>{
  const btn=document.getElementById('hamburgerBtn'),menu=document.getElementById('settingsMenu'),modal=document.getElementById('adminModal');
  if(!btn.contains(e.target)&&!menu.contains(e.target)&&!modal.contains(e.target)){btn.classList.remove('active');menu.classList.remove('active');}
});
function setLanguage(l){
  lang=l;localStorage.setItem('lang',l);applyLanguage();updateDate();
  document.querySelectorAll('[data-lang]').forEach(el=>el.classList.toggle('active',el.getAttribute('data-lang')===l));
}
function setTheme(th){
  theme=th;localStorage.setItem('theme',th);applyTheme();
  document.querySelectorAll('[data-theme]').forEach(el=>el.classList.toggle('active',el.getAttribute('data-theme')===th));
}
function applyLanguage(){
  document.documentElement.lang=lang;
  document.getElementById('brandTag').textContent=t[lang].brandTag;
  document.getElementById('heroTitle').innerHTML=t[lang].heroTitle;
  document.getElementById('sectionTitle').textContent=t[lang].sectionTitle;
  document.getElementById('sectionSubtitle').textContent=t[lang].sectionSubtitle;
  document.getElementById('footerText').textContent=t[lang].footerText;
  document.querySelectorAll('[data-en][data-es]').forEach(el=>{
    const a=lang==='en'?'data-en':'data-es';
    ['P','H3','SPAN','DIV','BUTTON','H2'].includes(el.tagName)?el.textContent=el.getAttribute(a):el.innerHTML=el.getAttribute(a);
  });
  renderCards();
}
function applyTheme(){
  theme==='light'?document.documentElement.setAttribute('data-theme','light'):document.documentElement.removeAttribute('data-theme');
}

// === ADMIN AUTH ===
function unlockAdmin(){
  const pwd=document.getElementById('adminPassword').value;
  if(pwd===ADMIN_PASSWORD){openAdminModal();document.getElementById('adminPassword').value='';toggleSettings();}
  else{alert(lang==='es'?'Contraseña incorrecta':'Incorrect password');document.getElementById('adminPassword').value='';}
}
function openAdminModal(){document.getElementById('adminModal').classList.add('active');renderAdminList();}
function closeAdminModal(){document.getElementById('adminModal').classList.remove('active');editingId=null;}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeAdminModal();});

// === GITHUB CONFIG ===
const GH_KEY='ghConfig';
function getGHConfig(){try{return JSON.parse(localStorage.getItem(GH_KEY))||{}}catch(e){return{}}}
function saveGHConfig(cfg){localStorage.setItem(GH_KEY,JSON.stringify(cfg))}
function isGHConfigured(){const c=getGHConfig();return!!(c.token&&c.repo&&c.path)}

// === CARD MANAGER STATE ===
let editingId=null,selIcon='🔧',selBadge=null,selStatus='active';

// === ADMIN LIST VIEW ===
function renderAdminList(){
  editingId=null;
  const cards=getCards();
  const rows=cards.map(c=>{
    const name=esc(lang==='es'?c.nameEs:c.nameEn);
    const active=c.status==='active';
    let chips=`<span class="cm-chip ${active?'cm-chip-active':'cm-chip-hold'}">${active?(lang==='es'?'Activo':'Active'):(lang==='es'?'En espera':'On Hold')}</span>`;
    if(c.badge==='new') chips+=`<span class="cm-chip cm-chip-new">${lang==='es'?'Nuevo':'New'}</span>`;
    if(c.badge==='updated') chips+=`<span class="cm-chip cm-chip-updated">${lang==='es'?'Actualizado':'Updated'}</span>`;
    const holdTip=active?(lang==='es'?'Pausar':'Hold'):(lang==='es'?'Activar':'Activate');
    return `<div class="cm-row">
      <div class="cm-icon">${c.icon}</div>
      <div class="cm-info"><div class="cm-name">${name}</div><div class="cm-chips">${chips}</div></div>
      <div class="cm-actions">
        <button class="cm-btn" onclick="showCardEdit('${c.id}')" title="${lang==='es'?'Editar':'Edit'}">✏️</button>
        <button class="cm-btn" onclick="toggleCardHold('${c.id}')" title="${holdTip}">${active?'⏸':'▶'}</button>
        <button class="cm-btn cm-btn-del" onclick="confirmDeleteCard('${c.id}')" title="${lang==='es'?'Eliminar':'Delete'}">🗑️</button>
      </div>
    </div>`;
  }).join('');
  const ghOk=isGHConfigured();
  const ghWarning=ghOk?'':`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:rgba(239,91,103,.12);border:1px solid rgba(239,91,103,.3);font-size:12px;font-weight:700;color:#ef5b67;margin-bottom:8px;cursor:pointer" onclick="showGHConfig()">⚠ ${lang==='es'?'GitHub no configurado — click para configurar':'GitHub not configured — click to set up'}</div>`;
  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header">
      <h2 class="modal-title">${lang==='es'?'Gestionar Tarjetas':'Manage Cards'}</h2>
      <button class="modal-close" onclick="closeAdminModal()">×</button>
    </div>
    ${ghWarning}
    <div class="cm-list">${rows}</div>
    <button class="cm-add-btn" onclick="showCardEdit(null)">+ ${lang==='es'?'Agregar tarjeta':'Add card'}</button>
    <button class="cm-export-btn" onclick="publishToGitHub()" style="${ghOk?'border-color:var(--green);color:var(--green)':''}">🚀 ${lang==='es'?'Publicar en Vercel':'Publish to Vercel'}</button>
    <button class="cm-export-btn" onclick="showGHConfig()" style="margin-top:4px;font-size:12px;opacity:.7">⚙ ${lang==='es'?'Configurar GitHub':'Configure GitHub'}</button>`;
}

// === CARD EDIT FORM ===
function showCardEdit(id){
  editingId=id;
  const c=id?getCards().find(x=>x.id===id):null;
  selIcon=c?c.icon:'🔧'; selBadge=c?c.badge:null; selStatus=c?c.status:'active';

  const emojiGrid=EMOJIS.map(e=>`<button class="emoji-opt${e===selIcon?' selected':''}" onclick="selectIcon('${e}',this)">${e}</button>`).join('');

  const badgeDefs=[{v:null,l:lang==='es'?'Ninguno':'None',cls:''},{v:'new',l:lang==='es'?'Nuevo':'New',cls:'sel-opt-new'},{v:'updated',l:lang==='es'?'Actualizado':'Updated',cls:'sel-opt-updated'}];
  const badgeRow=badgeDefs.map(b=>`<button class="sel-opt ${b.cls}${selBadge===b.v?' selected':''}" onclick="selectBadge(${b.v===null?'null':`'${b.v}'`},this)">${b.l}</button>`).join('');

  const statusRow=[{v:'active',l:lang==='es'?'Activo':'Active',cls:'sel-opt-active'},{v:'hold',l:lang==='es'?'En Espera':'On Hold',cls:'sel-opt-hold'}]
    .map(s=>`<button class="sel-opt ${s.cls}${selStatus===s.v?' selected':''}" onclick="selectStatus('${s.v}',this)">${s.l}</button>`).join('');

  const g=n=>c?esc(c[n]||''):'';
  const holdEs=c?(c.holdLabelEs||'Próximamente'):'Próximamente';
  const holdEn=c?(c.holdLabelEn||'Coming Soon'):'Coming Soon';

  document.getElementById('modalContent').innerHTML=`
    <button class="ef-back" onclick="renderAdminList()">← ${lang==='es'?'Volver':'Back'}</button>
    <div class="modal-header" style="margin-bottom:16px">
      <h2 class="modal-title">${id?(lang==='es'?'Editar Tarjeta':'Edit Card'):(lang==='es'?'Nueva Tarjeta':'New Card')}</h2>
      <button class="modal-close" onclick="closeAdminModal()">×</button>
    </div>
    <div class="ef-scroll">
      <div class="ef-grid">
        <div class="ef-full"><div class="ef-label">${lang==='es'?'Ícono':'Icon'}</div><div class="emoji-picker">${emojiGrid}</div></div>
        <div><div class="ef-label">${lang==='es'?'Nombre (ES)':'Name (ES)'}</div><input class="ef-input" id="ef_nameEs" value="${g('nameEs')}" placeholder="Nombre en español"/></div>
        <div><div class="ef-label">${lang==='es'?'Nombre (EN)':'Name (EN)'}</div><input class="ef-input" id="ef_nameEn" value="${g('nameEn')}" placeholder="Name in English"/></div>
        <div class="ef-full"><div class="ef-label">${lang==='es'?'Descripción (ES)':'Description (ES)'}</div><textarea class="ef-textarea" id="ef_descEs" placeholder="Descripción en español...">${g('descEs')}</textarea></div>
        <div class="ef-full"><div class="ef-label">${lang==='es'?'Descripción (EN)':'Description (EN)'}</div><textarea class="ef-textarea" id="ef_descEn" placeholder="Description in English...">${g('descEn')}</textarea></div>
        <div class="ef-full"><div class="ef-label">URL / Link</div><input class="ef-input" id="ef_url" value="${g('url')}" placeholder="https://... (${lang==='es'?'dejar vacío si no hay enlace':'leave empty if no link'})"/></div>
        <div><div class="ef-label">${lang==='es'?'Etiqueta inactivo (ES)':'Inactive label (ES)'}</div><input class="ef-input" id="ef_holdEs" value="${esc(holdEs)}" placeholder="Próximamente"/></div>
        <div><div class="ef-label">${lang==='es'?'Etiqueta inactivo (EN)':'Inactive label (EN)'}</div><input class="ef-input" id="ef_holdEn" value="${esc(holdEn)}" placeholder="Coming Soon"/></div>
        <div class="ef-full"><div class="ef-label">Badge</div><div class="sel-row">${badgeRow}</div></div>
        <div class="ef-full"><div class="ef-label">${lang==='es'?'Estado':'Status'}</div><div class="sel-row">${statusRow}</div></div>
      </div>
      <div class="modal-actions">
        <button class="modal-btn" onclick="renderAdminList()">${lang==='es'?'Cancelar':'Cancel'}</button>
        <button class="modal-btn modal-btn-primary" onclick="saveCardEdit()">${lang==='es'?'Guardar':'Save'}</button>
      </div>
    </div>`;
}

function selectIcon(emoji,btn){
  selIcon=emoji;
  document.querySelectorAll('.emoji-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function selectBadge(val,btn){
  selBadge=val;
  btn.closest('.sel-row').querySelectorAll('.sel-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}
function selectStatus(val,btn){
  selStatus=val;
  btn.closest('.sel-row').querySelectorAll('.sel-opt').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function saveCardEdit(){
  const nameEs=document.getElementById('ef_nameEs').value.trim();
  const nameEn=document.getElementById('ef_nameEn').value.trim();
  if(!nameEs||!nameEn){alert(lang==='es'?'Ingresa el nombre en ambos idiomas.':'Enter the name in both languages.');return;}
  const card={
    id:editingId||('card_'+Date.now()),
    icon:selIcon,nameEs,nameEn,
    descEs:document.getElementById('ef_descEs').value.trim(),
    descEn:document.getElementById('ef_descEn').value.trim(),
    badge:selBadge,
    url:document.getElementById('ef_url').value.trim(),
    status:selStatus,
    holdLabelEs:document.getElementById('ef_holdEs').value.trim()||'Próximamente',
    holdLabelEn:document.getElementById('ef_holdEn').value.trim()||'Coming Soon'
  };
  let cards=getCards();
  cards=editingId?cards.map(c=>c.id===editingId?card:c):[...cards,card];
  saveCards(cards);renderCards();renderAdminList();
}

function toggleCardHold(id){
  saveCards(getCards().map(c=>c.id===id?Object.assign({},c,{status:c.status==='active'?'hold':'active'}):c));
  renderCards();renderAdminList();
}

// === GITHUB CONFIG UI ===
function showGHConfig(){
  const cfg=getGHConfig();
  document.getElementById('modalContent').innerHTML=`
    <button class="ef-back" onclick="renderAdminList()">← ${lang==='es'?'Volver':'Back'}</button>
    <div class="modal-header" style="margin-bottom:16px">
      <h2 class="modal-title">${lang==='es'?'Configurar GitHub':'Configure GitHub'}</h2>
      <button class="modal-close" onclick="closeAdminModal()">×</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <div class="ef-label">GitHub Token (repo scope)</div>
        <input class="ef-input" id="gh_token" type="password" value="${cfg.token||''}" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"/>
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${lang==='es'?'Settings → Developer settings → Personal access tokens → repo':'Settings → Developer settings → Personal access tokens → repo'}</div>
      </div>
      <div>
        <div class="ef-label">${lang==='es'?'Repositorio (usuario/repo)':'Repository (user/repo)'}</div>
        <input class="ef-input" id="gh_repo" value="${cfg.repo||'CLB96/landing-page'}" placeholder="CLB96/landing-page"/>
      </div>
      <div>
        <div class="ef-label">${lang==='es'?'Ruta del archivo':'File path'}</div>
        <input class="ef-input" id="gh_path" value="${cfg.path||'index.html'}" placeholder="index.html"/>
      </div>
      <div>
        <div class="ef-label">Branch</div>
        <input class="ef-input" id="gh_branch" value="${cfg.branch||'master'}" placeholder="master"/>
      </div>
      <div class="modal-actions" style="margin-top:8px">
        <button class="modal-btn" onclick="renderAdminList()">${lang==='es'?'Cancelar':'Cancel'}</button>
        <button class="modal-btn modal-btn-primary" onclick="saveGHConfigForm()">${lang==='es'?'Guardar':'Save'}</button>
      </div>
    </div>`;
}

function saveGHConfigForm(){
  const token=document.getElementById('gh_token').value.trim();
  const repo=document.getElementById('gh_repo').value.trim();
  const path=document.getElementById('gh_path').value.trim();
  const branch=document.getElementById('gh_branch').value.trim();
  if(!token||!repo||!path){alert(lang==='es'?'Completa todos los campos.':'Fill in all fields.');return;}
  saveGHConfig({token,repo,path,branch:branch||'master'});
  renderAdminList();
}

// === PUBLISH TO GITHUB → VERCEL ===
async function publishToGitHub(){
  if(!isGHConfigured()){showGHConfig();return;}
  const cfg=getGHConfig();
  const btn=document.querySelector('.cm-export-btn');
  const origText=btn?btn.innerHTML:'';
  if(btn){btn.innerHTML=`⏳ ${lang==='es'?'Publicando...':'Publishing...'}`;btn.disabled=true;}
  try{
    const headers={
      'Authorization':`Bearer ${cfg.token}`,
      'Accept':'application/vnd.github+json',
      'X-GitHub-Api-Version':'2022-11-28'
    };
    // 1. Obtener SHA actual del archivo
    const apiUrl=`https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
    const fileRes=await fetch(`${apiUrl}?ref=${cfg.branch}`,{headers});
    if(!fileRes.ok) throw new Error(lang==='es'?`Error al leer archivo en GitHub (${fileRes.status})`:`Failed to read file on GitHub (${fileRes.status})`);
    const fileData=await fileRes.json();
    const sha=fileData.sha;
    // 2. Obtener HTML actual de la página
    const pageRes=await fetch(window.location.href);
    if(!pageRes.ok) throw new Error(lang==='es'?'No se pudo obtener el HTML de la página':'Could not fetch page HTML');
    const html=await pageRes.text();
    // 3. Inyectar tarjetas actualizadas
    const cards=getCards();
    const cardsJSON=JSON.stringify(cards,null,2);
    const replacement=`// __CARDS_START__\nconst DEFAULT_CARDS=${cardsJSON};\n// __CARDS_END__`;
    const newHtml=html.replace(/\/\/ __CARDS_START__[\s\S]*?\/\/ __CARDS_END__/,replacement);
    if(newHtml===html) throw new Error(lang==='es'?'No se encontró el marcador __CARDS_START__ en el HTML':'Marker __CARDS_START__ not found in HTML');
    // 4. Codificar en base64 (compatible con UTF-8)
    const b64=btoa(unescape(encodeURIComponent(newHtml)));
    // 5. Commit vía API
    const commitRes=await fetch(apiUrl,{
      method:'PUT',
      headers:{...headers,'Content-Type':'application/json'},
      body:JSON.stringify({
        message:`chore: update tool cards [${new Date().toISOString().slice(0,10)}]`,
        content:b64,
        sha,
        branch:cfg.branch
      })
    });
    if(!commitRes.ok){
      const err=await commitRes.json().catch(()=>({}));
      throw new Error(err.message||`GitHub API error ${commitRes.status}`);
    }
    if(btn){btn.innerHTML=`✅ ${lang==='es'?'¡Publicado! Vercel redesplegará en ~30s':'Published! Vercel will redeploy in ~30s'}`;btn.disabled=false;}
    setTimeout(()=>{if(btn){btn.innerHTML=origText;btn.disabled=false;}},4000);
  }catch(e){
    if(btn){btn.innerHTML=origText;btn.disabled=false;}
    alert(`❌ ${e.message}`);
  }
}

function confirmDeleteCard(id){
  const c=getCards().find(x=>x.id===id);
  const name=c?(lang==='es'?c.nameEs:c.nameEn):id;
  if(confirm(lang==='es'?`¿Eliminar "${name}"? No se puede deshacer.`:`Delete "${name}"? This cannot be undone.`)){
    saveCards(getCards().filter(c=>c.id!==id));
    renderCards();renderAdminList();
  }
}

// === INIT ===
applyTheme();applyLanguage();updateDate();
document.querySelectorAll('[data-lang]').forEach(el=>el.classList.toggle('active',el.getAttribute('data-lang')===lang));
document.querySelectorAll('[data-theme]').forEach(el=>el.classList.toggle('active',el.getAttribute('data-theme')===theme));
setInterval(updateDate,60000);
</script>
